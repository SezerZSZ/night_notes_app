{% extends "base.html" %}

{% block content %}
<h2>Delete Mood: {{ object.name }}</h2>
<p>Are you sure you want to delete this mood? This action cannot be undone.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'moods_list' %}">Cancel</a>
</form>
{% endblock %}
