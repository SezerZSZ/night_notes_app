{% extends "base.html" %}

{% block content %}
<h2>All Notes</h2>
{% if notes %}
<ul>
    {% for note in notes %}
    <li>
        <a href="{% url 'note_details' note.pk %}">{{ note.title }}</a>
        - Category: {{ note.category.name }}
        {% if note.is_favorite %}★{% endif %}
    </li>
    {% endfor %}
</ul>
{% else %}
<p>No notes yet.</p>
{% endif %}
{% endblock %}
