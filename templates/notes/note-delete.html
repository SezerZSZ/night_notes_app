{% extends "base.html" %}
{% block title %}Delete Note{% endblock %}

{% block content %}
<div class="container">
    <h2>Are you sure you want to delete "{{ note.title }}"?</h2>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirm Delete</button>
        <a href="{% url 'notes_list' %}">Cancel</a>
    </form>
</div>
{% endblock %}
