{% extends "base.html" %}
{% block title %}{% if note %}Edit{% else %}Create{% endif %} Note{% endblock %}

{% block content %}
<h1>{% if note %}Edit{% else %}Create{% endif %} Note</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Save Note">
</form>
<a href="{% url 'notes_list' %}">Cancel</a>
{% endblock %}
